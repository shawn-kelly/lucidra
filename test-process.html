<!DOCTYPE html>
<html>
<head>
    <title>Process Button Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-button { 
            background: #4CAF50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 10px;
        }
        .workspace { 
            display: none; 
            padding: 20px; 
            background: #f5f5f5; 
            margin: 20px 0;
            border-radius: 5px; 
        }
        .log { 
            background: #333; 
            color: #0f0; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 Process Button Diagnostic Test</h1>
    
    <div class="log" id="log">
        Diagnostic log will appear here...
    </div>
    
    <button class="test-button" onclick="testShowView('process-mgmt')">
        🔧 Test Process Button
    </button>
    
    <button class="test-button" onclick="testShowView('dashboard')">
        🏠 Test Dashboard Button
    </button>
    
    <button class="test-button" onclick="runFullDiagnostic()">
        🩺 Run Full Diagnostic
    </button>
    
    <div id="dashboard" class="workspace">
        <h2>✅ Dashboard View</h2>
        <p>This is the dashboard workspace.</p>
    </div>
    
    <div id="process-mgmt-workspace" class="workspace">
        <h2>⚙️ Process Management View</h2>
        <p>This is the process management workspace with BPMN designer.</p>
        <div style="padding: 20px; background: white; border-radius: 5px; margin: 10px 0;">
            <h3>🎯 BPMN Designer</h3>
            <p>Interactive process modeling tool would be here...</p>
        </div>
    </div>
    
    <script>
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `${timestamp}: ${message}<br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function testShowView(viewName) {
            log(`🚀 Testing showView('${viewName}')`);
            
            try {
                // Hide all views
                document.querySelectorAll('.workspace').forEach((view, index) => {
                    log(`  📋 Hiding view: ${view.id} (${index})`);
                    view.style.display = 'none';
                });
                
                // Show selected view
                if (viewName === 'dashboard') {
                    const dashboardElement = document.getElementById('dashboard');
                    if (dashboardElement) {
                        dashboardElement.style.display = 'block';
                        log(`  ✅ Showed dashboard`);
                    } else {
                        log(`  ❌ Dashboard element not found`);
                    }
                } else {
                    const workspace = document.getElementById(viewName + '-workspace');
                    if (workspace) {
                        workspace.style.display = 'block';
                        log(`  ✅ Showed workspace: ${workspace.id}`);
                    } else {
                        log(`  ❌ Workspace not found: ${viewName}-workspace`);
                    }
                }
                
                log(`✅ showView('${viewName}') completed successfully`);
                
            } catch (error) {
                log(`❌ Error in showView('${viewName}'): ${error.message}`);
            }
        }
        
        function runFullDiagnostic() {
            log('🩺 RUNNING FULL DIAGNOSTIC');
            log('==========================');
            
            // Check DOM elements
            const dashboard = document.getElementById('dashboard');
            log(`Dashboard element exists: ${dashboard ? '✅' : '❌'}`);
            
            const processWorkspace = document.getElementById('process-mgmt-workspace');
            log(`Process workspace exists: ${processWorkspace ? '✅' : '❌'}`);
            
            // List all workspaces
            const workspaces = document.querySelectorAll('.workspace');
            log(`Total workspaces found: ${workspaces.length}`);
            workspaces.forEach((ws, index) => {
                log(`  Workspace ${index}: ${ws.id} (display: ${ws.style.display || 'default'})`);
            });
            
            // Test actual function calls
            log('🧪 Testing function calls...');
            testShowView('process-mgmt');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('🔧 DOM loaded - Test environment ready');
        });
    </script>
</body>
</html>
